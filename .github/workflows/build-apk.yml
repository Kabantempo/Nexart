name: Build & Deploy APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK (EAS)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK download URL
        id: get-url
        run: |
          URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            | jq -r '.[0].artifacts.buildUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "APK URL: $URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          curl -L -o Nexart.apk "${{ steps.get-url.outputs.url }}"
          ls -lh Nexart.apk

      - name: Deploy APK to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          include: |
            Nexart.apk
          dangerous-clean-slate: false
